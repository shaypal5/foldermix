name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,all]"
      - name: Lint
        run: ruff check . && ruff format --check .

  smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,all]"
      - name: Unit Smoke Tests (No Integration/Slow)
        run: python -m pytest -m "not integration and not slow" -o addopts="-vv -ra --strict-markers --strict-config"

  minimal-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install core + dev dependencies (no optional extras)
        run: pip install -e ".[dev]"
      - name: Core Behavior Tests (No Integration/Slow)
        run: >
          python -m pytest
          tests/test_cli.py
          tests/test_converters.py
          tests/test_converters_fallback.py
          tests/test_packer.py
          tests/test_packer_edges.py
          tests/test_scanner.py
          tests/test_scanner_edge.py
          tests/test_snapshot_guard.py
          tests/test_utils.py
          tests/test_writers.py
          tests/test_writers_edge.py
          -m "not integration and not slow"
          -o addopts="-vv -ra --strict-markers --strict-config"

  package-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel in clean venv and run CLI black-box assertions
        run: |
          set -euo pipefail
          python -m venv .pkg-smoke-venv
          ./.pkg-smoke-venv/bin/pip install dist/*.whl

          assert_contains() {
            haystack="$1"
            needle="$2"
            if ! printf "%s" "$haystack" | grep -Fq "$needle"; then
              echo "Expected output to contain: $needle"
              echo "Actual output:"
              printf "%s\n" "$haystack"
              exit 1
            fi
          }

          run_expect() {
            expected="$1"
            shift
            set +e
            output="$("$@" 2>&1)"
            status=$?
            set -e
            if [ "$status" -ne "$expected" ]; then
              echo "Expected exit code $expected, got $status"
              echo "Command: $*"
              echo "Output:"
              printf "%s\n" "$output"
              exit 1
            fi
            printf "%s" "$output"
          }

          export NO_COLOR=1

          mkdir -p smoke_input
          printf "hello\n" > smoke_input/a.txt

          version_out="$(run_expect 0 ./.pkg-smoke-venv/bin/foldermix version)"
          assert_contains "$version_out" "foldermix "

          list_out="$(run_expect 0 ./.pkg-smoke-venv/bin/foldermix list smoke_input)"
          assert_contains "$list_out" "a.txt"
          assert_contains "$list_out" "1 files would be included, 0 skipped."

          stats_out="$(run_expect 0 ./.pkg-smoke-venv/bin/foldermix stats smoke_input)"
          assert_contains "$stats_out" "Included files: 1"
          assert_contains "$stats_out" ".txt"

          pack_out="$(run_expect 0 ./.pkg-smoke-venv/bin/foldermix pack smoke_input --out smoke_output.md)"
          assert_contains "$pack_out" "Done!"
          assert_contains "$pack_out" "smoke_output.md"
          test -f smoke_output.md

          invalid_pack_out="$(run_expect 1 ./.pkg-smoke-venv/bin/foldermix pack smoke_input --format bad)"
          assert_contains "$invalid_pack_out" "Invalid format"

          invalid_list_out="$(run_expect 2 ./.pkg-smoke-venv/bin/foldermix list smoke_input --bad-flag)"
          assert_contains "$invalid_list_out" "No such option"

          invalid_stats_out="$(run_expect 2 ./.pkg-smoke-venv/bin/foldermix stats smoke_input --bad-flag)"
          assert_contains "$invalid_stats_out" "No such option"

  full:
    runs-on: ubuntu-latest
    needs: [lint, smoke, minimal-deps, package-smoke]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,all]"
      - name: Full Test Suite (Coverage Gate)
        run: python -m pytest --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-pypi:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [full]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/foldermix/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Determine whether this push is a release commit
        id: release_guard
        run: |
          python - <<'PY'
          import pathlib
          import subprocess
          import tomllib

          current_version = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          previous_pyproject = subprocess.run(
              ["git", "show", "HEAD^:pyproject.toml"],
              check=False,
              capture_output=True,
              text=True,
          )
          if previous_pyproject.returncode == 0:
              previous_version = tomllib.loads(previous_pyproject.stdout)["project"]["version"]
          else:
              previous_version = None

          should_publish = previous_version != current_version
          with pathlib.Path("/tmp/release_outputs.txt").open("w", encoding="utf-8") as f:
              f.write(f"should_publish={'true' if should_publish else 'false'}\n")
              f.write(f"version={current_version}\n")

          print(
              "Release decision:",
              {
                  "should_publish": should_publish,
                  "current_version": current_version,
                  "previous_version": previous_version,
              },
          )
          PY
          cat /tmp/release_outputs.txt >> "$GITHUB_OUTPUT"
      - name: Skip publish (no version change)
        if: steps.release_guard.outputs.should_publish != 'true'
        run: echo "No pyproject version change detected; skipping publish."
      - name: Build package
        if: steps.release_guard.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        if: steps.release_guard.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
