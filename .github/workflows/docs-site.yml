name: Docs Site

on:
  pull_request:
    paths:
      - site-docs/**
      - mkdocs.yml
      - pyproject.toml
      - README.md
      - CONTRIBUTING.md
      - .github/workflows/docs-site.yml
  push:
    branches: [main]
    paths:
      - site-docs/**
      - mkdocs.yml
      - pyproject.toml
      - README.md
      - CONTRIBUTING.md
      - .github/workflows/docs-site.yml
  workflow_dispatch:

concurrency:
  group: docs-site-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: pip install -e ".[docs]"
      - name: Build docs site
        run: mkdocs build --strict
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
