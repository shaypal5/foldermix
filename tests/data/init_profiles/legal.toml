# foldermix starter configuration
# profile: legal
# intent: Privilege-aware document bundles with aggressive redaction defaults.
# rationale: Legal matter folders often contain privileged and personal data; this profile favors privacy-first output while keeping chain-of-custody checksums enabled.

# Pack defaults for this profile.
[pack]
include_ext = [".txt", ".md", ".pdf", ".docx", ".csv"]
hidden = false
respect_gitignore = true
on_oversize = "truncate"
continue_on_error = true
redact = "all"
strip_frontmatter = true
include_sha256 = true
include_toc = true
pdf_ocr = true
pdf_ocr_strict = false

# Stats defaults for this profile.
[stats]
include_ext = [".txt", ".md", ".pdf", ".docx", ".csv"]
hidden = false
