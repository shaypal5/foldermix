# foldermix starter configuration
# profile: research
# intent: Broad multimodal ingest for literature-heavy corpora with OCR enabled.
# rationale: Research folders are mixed-format and usually benefit from recall-first ingestion; this profile keeps outputs rich while still masking obvious direct identifiers.

# Pack defaults for this profile.
[pack]
include_ext = [".txt", ".md", ".rst", ".pdf", ".docx", ".xlsx", ".csv", ".tsv", ".json", ".yaml", ".yml"]
hidden = false
respect_gitignore = true
on_oversize = "truncate"
continue_on_error = true
redact = "emails"
strip_frontmatter = false
include_sha256 = true
include_toc = true
pdf_ocr = true
pdf_ocr_strict = false

# Stats defaults for this profile.
[stats]
include_ext = [".txt", ".md", ".rst", ".pdf", ".docx", ".xlsx", ".csv", ".tsv", ".json", ".yaml", ".yml"]
hidden = false
